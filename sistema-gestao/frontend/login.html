<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GestãoPro</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <h1>GestãoPro</h1>
        <p class="login-lead">Entre com sua conta para acessar o painel.</p>
        <form id="formLogin">
            <label class="form-label" for="email">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="voce@empresa.com" value="admin@email.com" required autocomplete="email">
            <label class="form-label" for="password">Senha</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" value="123456" required autocomplete="current-password">
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <div id="mensagem"></div>
        <p class="login-footer">
            Após o login bem-sucedido, acesse o <a href="index.html">painel</a>.
        </p>
    </div>

    <script>
        $('#formLogin').on('submit', function(evento) {
            evento.preventDefault();

            let emailDigitado = $('#email').val();
            let senhaDigitada = $('#password').val();
            let $mensagem = $('#mensagem');

            $mensagem.removeClass('msg-ok msg-err').text('Conectando com a API...');

            $.ajax({
                url: 'http://127.0.0.1:8000/api/login',
                method: 'POST',
                contentType: 'application/json',
                dataType: 'json',
                data: JSON.stringify({
                    email: emailDigitado,
                    password: senhaDigitada
                }),

                success: function(resposta) {
                    $mensagem.addClass('msg-ok').text('Login com sucesso! Redirecionando…');
                    localStorage.setItem('meu_token_vip', resposta.token);
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 600);
                },

                error: function(erro) {
                    if (erro.status === 401) {
                        $mensagem.addClass('msg-err').text('E-mail ou senha incorretos.');
                    } else {
                        $mensagem.addClass('msg-err').text('Erro ao conectar com a API. O servidor está rodando?');
                    }
                    console.error('Detalhe do erro:', erro);
                }
            });
        });
    </script>

</body>
</html>
