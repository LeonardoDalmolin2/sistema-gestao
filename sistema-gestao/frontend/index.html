<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GestãoPro</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</head>
<body class="bg-light">
    

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">GestãoPro</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" id="menu-clientes">Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="menu-faturas">Faturas</a>
                    </li>
                </ul>
                <button class="btn btn-outline-danger btn-sm" id="btn-logout">Sair</button>
            </div>
        </div>
    </nav>
    <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarCliente">
                        <input type="hidden" id="edit-client-id">
                            
                        <div class="mb-3">
                            <label for="edit-name" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="edit-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="edit-email" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-phone" class="form-label">Telefone</label>
                            <input type="text" class="form-control" id="edit-phone">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Salvar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <main class="container mt-5">
        
        <section id="tela-clientes">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Meus Clientes</h2>
                <button class="btn btn-primary" id="btn-novo-cliente">+ Novo Cliente</button>
            </div>
            
                <div class="card shadow-sm">
                        <div class="card-body">
                        <div class="row mb-4">
                            <div class="col-md-6 mb-2 mb-md-0">
                                <input type="text" id="filtro-busca" class="form-control" placeholder="Digite para buscar clientes...">
                            </div>
                            <div class="col-md-4 mb-2 mb-md-0">
                                <input type="date" id="filtro-data" class="form-control" title="Filtrar por data de adição">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-secondary w-100" id="btn-limpar-filtro">Limpar</button>
                            </div>
                        </div>
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Telefone</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-clientes">
                            <tr>
                                <td colspan="5" class="text-center text-muted py-3">Carregando clientes...</td>
                            </tr>
                        </tbody>
                    </table>
                    <nav aria-label="Navegação de clientes" class="mt-4">
                        <ul class="pagination justify-content-center" id="paginacao-clientes">
                            </ul>
                    </nav>
                </div>
            </div>
        </section>

        <section id="tela-faturas" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Minhas Faturas</h2>
                <button class="btn btn-success" id="btn-nova-fatura">+ Nova Fatura</button>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Cliente (ID)</th>
                                <th>Valor (R$)</th>
                                <th>Status</th>
                                <th>Vencimento</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-faturas">
                            <tr>
                                <td colspan="6" class="text-center text-muted py-3">Carregando faturas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
    
    </body>
</html>
